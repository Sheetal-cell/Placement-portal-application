{% extends "base.html" %}
{% block content %}

<h3>Student Registration</h3>

<form method="POST">

    <input class="form-control mb-2" name="name" placeholder="Full Name" required>
    <input class="form-control mb-2" name="email" placeholder="Email" required>
    <input type="password" class="form-control mb-2" name="password" placeholder="Password" required>

    <input class="form-control mb-2" name="roll" placeholder="Roll Number" required>
    <input class="form-control mb-2" name="course" placeholder="Course" required>
    <input class="form-control mb-2" name="cgpa" placeholder="CGPA" required>

    <button class="btn btn-success">Register</button>

</form>

{% endblock %}
