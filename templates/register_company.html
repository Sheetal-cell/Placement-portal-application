{% extends "base.html" %}
{% block content %}

<h3>Company Registration</h3>

<form method="POST">

    <input class="form-control mb-2" name="name" placeholder="HR Name" required>
    <input class="form-control mb-2" name="email" placeholder="Email" required>
    <input type="password" class="form-control mb-2" name="password" placeholder="Password" required>

    <input class="form-control mb-2" name="company_name" placeholder="Company Name" required>
    <input class="form-control mb-2" name="hr_contact" placeholder="HR Contact" required>
    <input class="form-control mb-2" name="website" placeholder="Website">

    <button class="btn btn-warning">Register</button>

</form>

{% endblock %}
